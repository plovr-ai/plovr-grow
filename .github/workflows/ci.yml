name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conflict-check:
    name: Conflict Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Check for merge conflicts with ${{ github.base_ref }}
        run: |
          git fetch --no-tags origin "${{ github.base_ref }}"
          MERGE_BASE=$(git merge-base HEAD "origin/${{ github.base_ref }}")
          if git merge-tree "$MERGE_BASE" HEAD "origin/${{ github.base_ref }}" | grep -q '^<<<<<<<'; then
            echo "::error::This PR has merge conflicts with ${{ github.base_ref }}. Please resolve them and push."
            exit 1
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: conflict-check
    if: ${{ !cancelled() && (needs.conflict-check.result == 'success' || needs.conflict-check.result == 'skipped') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint

  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    needs: conflict-check
    if: ${{ !cancelled() && (needs.conflict-check.result == 'success' || needs.conflict-check.result == 'skipped') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx vitest run --coverage

  migration-drift:
    name: Migration Drift Check
    runs-on: ubuntu-latest
    needs: conflict-check
    if: ${{ !cancelled() && (needs.conflict-check.result == 'success' || needs.conflict-check.result == 'skipped') }}
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: plovr_shadow
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Verify schema.prisma matches migrations directory
        run: |
          npx prisma migrate diff \
            --from-migrations prisma/migrations \
            --to-schema-datamodel prisma/schema.prisma \
            --shadow-database-url mysql://root:password@127.0.0.1:3306/plovr_shadow \
            --exit-code

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: conflict-check
    if: ${{ !cancelled() && (needs.conflict-check.result == 'success' || needs.conflict-check.result == 'skipped') }}
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: plovr_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: mysql://root:password@localhost:3306/plovr_test
      SQUARE_SANDBOX_ACCESS_TOKEN: ${{ secrets.SQUARE_SANDBOX_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx prisma db push
      - run: npm run test:integration

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: conflict-check
    if: ${{ !cancelled() && (needs.conflict-check.result == 'success' || needs.conflict-check.result == 'skipped') }}
    env:
      DATABASE_URL: mysql://dummy:dummy@localhost:3306/dummy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
